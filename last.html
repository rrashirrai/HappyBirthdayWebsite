<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Special Moments ✨</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #ffd1dc, #e6e6fa, #ffefd5);
        background-size: 400% 400%;
        animation: gradientFlow 12s ease infinite;
        font-family: 'Poppins', sans-serif;
        color: #444;
    }

    @keyframes gradientFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .welcome {
        text-align: center;
        padding: 3rem 1rem;
    }

    .welcome h1 {
        font-family: 'Dancing Script', cursive;
        font-size: 3rem;
        color: #ff4b8b;
    }

    .welcome p {
        margin-top: 10px;
    }

    .memory-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .memory-card {
        background: white;
        border-radius: 12px;
        padding: 10px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .memory-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
    }

    .memory-date {
        margin-top: 10px;
        font-weight: bold;
        color: #ff4b8b;
    }

    .memory-caption {
        font-size: 0.9rem;
        margin-top: 5px;
    }

    .final-message {
        text-align: center;
        padding: 2rem;
    }

    .final-message h2 {
        font-family: 'Dancing Script', cursive;
        color: #ff4b8b;
    }
